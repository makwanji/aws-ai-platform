# Ansible Inventory for AWS AI Platform
# This inventory dynamically sources from Terraform outputs
# For static inventory, see inventory-static.ini

# Bastion hosts (public subnet, direct access)
[bastion]
bastion ansible_host=<BASTION_PUBLIC_IP> ansible_user=ec2-user

# Private VMs accessed via bastion tunnel
[private_vms:children]
control_plane
compute_nodes
workers

# Control plane VMs (slurm-controller, k8s-control-plane)
[control_plane]
slurm-controller ansible_host=<SLURM_CONTROLLER_PRIVATE_IP> ansible_user=ec2-user
k8s-control-plane ansible_host=<K8S_CONTROL_PLANE_PRIVATE_IP> ansible_user=ec2-user

# GPU compute nodes
[compute_nodes]
gpu-node-1 ansible_host=<GPU_NODE_1_PRIVATE_IP> ansible_user=ec2-user
gpu-node-2 ansible_host=<GPU_NODE_2_PRIVATE_IP> ansible_user=ec2-user

# CPU workers
[workers]
cpu-worker ansible_host=<CPU_WORKER_PRIVATE_IP> ansible_user=ec2-user

# GPU nodes for specific role targeting
[gpu_nodes]
gpu-node-1
gpu-node-2

# Group variables for all hosts
[all:vars]
# SSH settings
ansible_ssh_private_key_file=~/.ssh/adnsg-aws-ai-platform.pem
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# For private VMs: use SSH ProxyCommand via bastion
# This is set in group_vars/private_vms.yml

# Timeout settings
ansible_connection_timeout=30
ansible_command_timeout=300
