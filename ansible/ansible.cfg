[defaults]
# Inventory file location
inventory = ./inventory.ini

# Remote user for SSH connections
remote_user = ubuntu

# Host key checking (disable for dynamic AWS instances)
host_key_checking = False

# SSH configuration
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
pipelining = True

# Disable retry files
retry_files_enabled = False

# Set roles path
roles_path = ./roles

# Increase default timeout
timeout = 30

# Enable callback plugins for better output
callback_whitelist = profile_tasks,timer

[privilege_escalation]
# Become settings (for sudo operations)
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# SSH multiplexing for faster connections
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ProxyCommand="ssh -W %h:%p -q {{ bastion_host }}"
