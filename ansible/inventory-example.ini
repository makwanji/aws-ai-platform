# Example: Static Inventory File
# This file shows how to manually populate inventory.ini with IPs

# Bastion hosts (public subnet - direct access)
[bastion]
bastion ansible_host=52.221.XXX.XXX ansible_user=ec2-user

# Group: All private VMs accessed via bastion
[private_vms:children]
control_plane
compute_nodes
workers

# Control plane nodes (SLURM, Kubernetes)
[control_plane]
slurm-controller ansible_host=10.10.20.50 ansible_user=ec2-user
k8s-control-plane ansible_host=10.10.20.51 ansible_user=ec2-user

# GPU compute nodes
[compute_nodes]
gpu-node-1 ansible_host=10.10.10.20 ansible_user=ec2-user
gpu-node-2 ansible_host=10.10.11.20 ansible_user=ec2-user

# CPU worker nodes
[workers]
cpu-worker ansible_host=10.10.10.30 ansible_user=ec2-user

# GPU nodes for GPU-specific operations
[gpu_nodes]
gpu-node-1
gpu-node-2

# ============================================================
# Global variables for ALL hosts
# ============================================================
[all:vars]

# SSH Configuration
ansible_ssh_private_key_file=~/.ssh/adnsg-aws-ai-platform.pem
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# Connection timeout settings
ansible_connection_timeout=30
ansible_command_timeout=300

# ============================================================
# Private VM specific variables
# These VMs use bastion host tunneling
# ============================================================
[private_vms:vars]
# Bastion configuration for SSH ProxyCommand
bastion_host=bastion
bastion_user=ec2-user
bastion_port=22

# SSH ProxyCommand for private VMs (via bastion)
# This is automatically set when targeting private_vms group
ansible_ssh_common_args=-o ProxyCommand="ssh -W %h:%p -i ~/.ssh/adnsg-aws-ai-platform.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ec2-user@52.221.XXX.XXX"

# ============================================================
# GPU node specific variables
# ============================================================
[gpu_nodes:vars]
# GPU driver and CUDA versions
nvidia_driver_version=latest
cuda_version=12.4

# GPU reboot settings
gpu_reboot_after_driver_update=yes
