---
# Tasks for common OS updates and package management

- name: Display update information
  debug:
    msg: |
      Starting system updates on {{ inventory_hostname }}
      OS Family: {{ ansible_os_family }}
      Kernel: {{ ansible_kernel }}
      Update Security Only: {{ update_security_only }}
      Reboot After Update: {{ reboot_after_update }}
  tags:
    - always

- name: Create update log directory
  file:
    path: "{{ log_directory }}"
    state: directory
    mode: '0755'
  when: enable_update_logging | bool

- name: Pre-update system checks
  block:
    - name: Get current system information before update
      debug:
        msg: |
          Hostname: {{ ansible_hostname }}
          Uptime: {{ ansible_uptime_seconds }} seconds
          Free Memory: {{ ansible_memfree_mb }} MB
          Available Disk Space: {{ ansible_mounts[0].size_available }} bytes
      when: run_pre_update_checks | bool

    - name: Backup current package list
      shell: |
        rpm -qa > {{ log_directory }}/installed_packages_before.txt 2>/dev/null || \
        dpkg -l > {{ log_directory }}/installed_packages_before.txt
      when: enable_update_logging | bool
      changed_when: false
  tags:
    - pre-update-checks

# RedHat/Amazon Linux updates
- name: RedHat/Amazon Linux package updates
  block:
    - name: Update yum cache
      yum:
        name: '*'
        state: latest
      when: not update_security_only | bool
      register: yum_update

    - name: Update security packages only (RedHat/Amazon)
      yum:
        name: '*'
        security: yes
        state: latest
      when: update_security_only | bool
      register: yum_security_update

    - name: Install common utilities
      yum:
        name:
          - git
          - curl
          - wget
          - htop
          - tmux
          - vim
        state: present

    - name: Check if reboot is needed
      command: needs-restarting -r
      register: reboot_check
      failed_when: reboot_check.rc not in [0, 1]
      changed_when: false
      when: reboot_after_update | bool

  when: ansible_os_family in ["RedHat", "Amazon"]
  tags:
    - package-update
    - redhat-update

# Debian/Ubuntu updates
- name: Debian/Ubuntu package updates
  block:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Update all packages
      apt:
        name: '*'
        state: latest
      when: not update_security_only | bool
      register: apt_update

    - name: Update security packages only (Debian/Ubuntu)
      apt:
        name: '*'
        only_upgrade: yes
        default_release: "{{ ansible_lsb.codename }}-security"
      when: update_security_only | bool
      register: apt_security_update

    - name: Install common utilities
      apt:
        name:
          - git
          - curl
          - wget
          - htop
          - tmux
          - vim
        state: present

    - name: Check if reboot is needed
      stat:
        path: /var/run/reboot-required
      register: reboot_required
      when: reboot_after_update | bool

  when: ansible_os_family == "Debian"
  tags:
    - package-update
    - debian-update

- name: Post-update system checks
  block:
    - name: Get system information after update
      debug:
        msg: |
          Hostname: {{ ansible_hostname }}
          Uptime: {{ ansible_uptime_seconds }} seconds
          Free Memory: {{ ansible_memfree_mb }} MB
      when: run_post_update_checks | bool

    - name: Backup updated package list
      shell: |
        rpm -qa > {{ log_directory }}/installed_packages_after.txt 2>/dev/null || \
        dpkg -l > {{ log_directory }}/installed_packages_after.txt
      when: enable_update_logging | bool
      changed_when: false

    - name: Log update completion
      copy:
        content: |
          Update completed on {{ inventory_hostname }}
          Date: {{ ansible_date_time.iso8601 }}
          Packages Updated: {{ yum_update.results | default('N/A') }}
          Reboot Required: {{ reboot_required.stat.exists | default(False) }}
        dest: "{{ log_directory }}/update_log_{{ ansible_date_time.date }}.txt"
      when: enable_update_logging | bool

  tags:
    - post-update-checks

- name: Reboot if required
  reboot:
    msg: "Rebooting system after updates"
    connect_timeout: 5
    reboot_timeout: "{{ reboot_timeout }}"
    pre_reboot_delay: 10
    post_reboot_delay: 30
  when: reboot_after_update | bool
  tags:
    - reboot

- name: Display update summary
  debug:
    msg: |
      System updates completed on {{ inventory_hostname }}
      YUM Updates: {{ yum_update | default({}) | to_nice_json }}
      APT Updates: {{ apt_update | default({}) | to_nice_json }}
  tags:
    - always
